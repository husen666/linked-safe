name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Tag or commit to deploy (optional)"
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script: |
            set -e
            DEPLOY_DIR="${{ secrets.PROD_DEPLOY_DIR }}"
            REPO_URL="https://github.com/husen666/linked-safe.git"
            BRANCH="main"
            TARGET_REF="${{ github.event.inputs.git_ref }}"

            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              mkdir -p "$(dirname "$DEPLOY_DIR")"
              git clone "$REPO_URL" "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"
            git fetch --all --tags --prune
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"
            chmod +x deploy/scripts/release-deploy.sh

            if [ -n "$TARGET_REF" ]; then
              ./deploy/scripts/release-deploy.sh prod "$TARGET_REF"
            else
              ./deploy/scripts/release-deploy.sh prod
            fi
