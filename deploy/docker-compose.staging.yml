services:
  db:
    image: mysql:8.0
    container_name: linkedsafe-staging-db
    restart: unless-stopped
    env_file:
      - ../.env.staging
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - staging_db_data:/var/lib/mysql
      - ../mysql-init/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./mysql/my.cnf:/etc/mysql/conf.d/zz-tuning.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: linkedsafe-staging-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - staging_redis_data:/data

  wordpress:
    image: wordpress:6.8-php8.2-apache
    container_name: linkedsafe-staging-wp
    restart: unless-stopped
    env_file:
      - ../.env.staging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../site:/var/www/html
      - ./php/custom.ini:/usr/local/etc/php/conf.d/zz-custom.ini:ro

  nginx:
    image: nginx:1.27-alpine
    container_name: linkedsafe-staging-nginx
    restart: unless-stopped
    depends_on:
      - wordpress
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/performance.conf:/etc/nginx/conf.d/00-performance.conf:ro
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ../ssl/staging:/etc/nginx/ssl:ro

volumes:
  staging_db_data:
  staging_redis_data:
