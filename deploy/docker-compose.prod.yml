services:
  db:
    image: mysql:8.0
    container_name: linkedsafe-prod-db
    restart: unless-stopped
    env_file:
      - ../.env.prod
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - prod_db_data:/var/lib/mysql
      - ../mysql-init/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./mysql/my.cnf:/etc/mysql/conf.d/zz-tuning.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: linkedsafe-prod-redis
    restart: unless-stopped
    env_file:
      - ../.env.prod
    command: ["sh", "-c", "exec redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass \"$REDIS_PASSWORD\""]
    volumes:
      - prod_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 30

  wordpress:
    image: wordpress:6.8-php8.2-apache
    container_name: linkedsafe-prod-wp
    restart: unless-stopped
    env_file:
      - ../.env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../site:/var/www/html
      - ./php/custom.ini:/usr/local/etc/php/conf.d/zz-custom.ini:ro
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(@fopen(\"http://127.0.0.1/wp-login.php\",\"r\")?0:1);'"]
      interval: 15s
      timeout: 8s
      retries: 20

  nginx:
    image: nginx:1.27-alpine
    container_name: linkedsafe-prod-nginx
    restart: unless-stopped
    depends_on:
      wordpress:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/performance.conf:/etc/nginx/conf.d/00-performance.conf:ro
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ../ssl/prod:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  prod_db_data:
  prod_redis_data:
