server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name test.linked-safe.com _;
  return 301 https://test.linked-safe.com$request_uri;
}

server {
  listen 443 ssl http2 default_server;
  listen [::]:443 ssl http2 default_server;
  server_name test.linked-safe.com _;

  ssl_certificate /etc/nginx/ssl/Nginx/test.linked-safe.com_cert_chain.pem;
  ssl_certificate_key /etc/nginx/ssl/Nginx/test.linked-safe.com_key.key;

  client_max_body_size 64m;

  location / {
    proxy_pass http://wordpress:80;
    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    proxy_buffering on;
    proxy_buffers 16 16k;
    proxy_busy_buffers_size 64k;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
